<!DOCTYPE html>
<!--
  templates/login.html
  Pantalla de login: valida usuario/contraseña (o token personal) contra
  la propia instancia de SonarQube (POST /login en app.py, que consulta
  /api/authentication/validate). No hay una base de usuarios propia — cada
  persona usa exactamente su cuenta de SonarQube.
-->
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión · SonarQube Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo-dot"><i class="bi bi-shield-check"></i></div>
      <h1>SonarQube Dashboard</h1>
      <p class="login-subtitle">Iniciá sesión con tu usuario de SonarQube ({{ host }})</p>
    </div>

    {% if error %}
    <div class="login-error"><i class="bi bi-exclamation-triangle-fill"></i> {{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login', next=request.args.get('next')) }}" class="login-form">
      <label class="login-label" for="username">Usuario o token personal</label>
      <input
        id="username" name="username" type="text" class="login-input"
        placeholder="tu.usuario o squ_xxxxxxxx" value="{{ username_value }}"
        autocomplete="username" autofocus required
      />

      <label class="login-label" for="password">Contraseña</label>
      <input
        id="password" name="password" type="password" class="login-input"
        placeholder="Dejar vacío si usás un token" autocomplete="current-password"
      />
      <p class="login-hint">
        <i class="bi bi-info-circle"></i>
        Si usás un token de SonarQube (Mi cuenta → Seguridad → Tokens), pegalo en
        "Usuario" y dejá la contraseña vacía — es más seguro que usar tu contraseña real.
      </p>

      <button type="submit" class="btn-solid login-submit">
        <i class="bi bi-box-arrow-in-right"></i> Ingresar
      </button>
    </form>
  </div>
  <p class="login-footer-note">Powered by <strong>Ludycom</strong></p>
</div>

</body>
</html>
